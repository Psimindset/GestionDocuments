<!DOCTYPE html>
<html>
<head>
  <title>Signer un PDF</title>
  <style>
    body   { font-family: Arial; max-width: 560px; margin: 40px auto; }
    input, select { display: block; width: 100%; margin: 8px 0;
                    padding: 8px; box-sizing: border-box; }
    .btn-blue  { background: #2c7be5; color: white; border: none;
                 padding: 10px 18px; cursor: pointer; border-radius: 4px;
                 font-size: 14px; width: 100%; margin-top: 10px; }
    .btn-grey  { background: #6c757d; color: white; border: none;
                 padding: 6px 14px; cursor: pointer; border-radius: 4px;
                 font-size: 13px; }
    .retour { display: block; margin-top: 16px; text-align: center; }
    .err  { background: #f8d7da; padding: 10px; border-radius: 4px;
            color: #721c24; margin-bottom: 12px; }
    h3    { color: #2c7be5; border-bottom: 2px solid #2c7be5;
            padding-bottom: 4px; margin-top: 24px; }
    .canvas-wrapper { border: 2px solid #2c7be5; border-radius: 6px;
                      background: #fff; margin: 8px 0; position: relative; }
    #canvas-sig     { display: block; cursor: crosshair;
                      border-radius: 4px; }
    .canvas-label   { font-size: 12px; color: #888; margin-bottom: 4px; }
    .canvas-actions { display: flex; gap: 8px; margin-top: 6px; }
    .nom-fields     { display: flex; gap: 10px; }
    .nom-fields div { flex: 1; }
    optgroup { font-weight: bold; }
  </style>
</head>
<body>
  <h2>Signature électronique d'un PDF</h2>
  {% if erreur %}
    <p class="err">❌ {{ erreur }}</p>
  {% endif %}

  <form method="POST" action="/signature" id="form-sig">

    <h3>👤 Identité du signataire</h3>
    <div class="nom-fields">
      <div>
        <label>Prénom</label>
        <input type="text" name="prenom" placeholder="Marie" required>
      </div>
      <div>
        <label>Nom</label>
        <input type="text" name="nom" placeholder="Tremblay" required>
      </div>
    </div>
    <label>Date de signature</label>
    <input type="date" name="date_signature" required>
    <h3>📄 Fichier PDF à signer</h3>
    {% if fichiers %}
      <select name="chemin" required>
        <option value="">-- Choisir un fichier --</option>
        <optgroup label="📤 Fichiers convertis (outputs/)">
          {% for f in fichiers if f.chemin.startswith('outputs') %}
            <option value="{{ f.chemin }}">{{ f.nom }}</option>
          {% endfor %}
        </optgroup>
        <optgroup label="📥 Fichiers uploadés (uploads/)">
          {% for f in fichiers if f.chemin.startswith('uploads') %}
            <option value="{{ f.chemin }}">{{ f.nom }}</option>
          {% endfor %}
        </optgroup>
      </select>
    {% else %}
      <p style="color:#999; font-style:italic;">Aucun PDF disponible.</p>
    {% endif %}

    <h3>✍️ Signature graphique</h3>
    <p class="canvas-label">
      Dessinez votre signature dans la zone ci-dessous :
    </p>
    <div class="canvas-wrapper">
      <canvas id="canvas-sig" width="520" height="150"></canvas>
    </div>
    <div class="canvas-actions">
      <button type="button" class="btn-grey" onclick="effacer()">
        🗑 Effacer
      </button>
    </div>
    <input type="hidden" name="signature_img" id="signature_img">

    <input class="btn-blue" type="submit"
           value="✅ Apposer la signature" onclick="sauvegarder()">
  </form>

  <a class="retour" href="/accueil">← Retour au menu</a>
  <script>
    const canvas = document.getElementById('canvas-sig');
    const ctx    = canvas.getContext('2d');
    let dessin   = false;

    ctx.strokeStyle = '#1a1aff';
    ctx.lineWidth   = 2.5;
    ctx.lineCap     = 'round';

    canvas.addEventListener('mousedown', e => {
      dessin = true;
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    });
    canvas.addEventListener('mousemove', e => {
      if (!dessin) return;
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
    });
    canvas.addEventListener('mouseup',   () => dessin = false);
    canvas.addEventListener('mouseleave', () => dessin = false);
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      dessin = true;
      ctx.beginPath();
      ctx.moveTo(e.touches[0].clientX - r.left,
                 e.touches[0].clientY - r.top);
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!dessin) return;
      const r = canvas.getBoundingClientRect();
      ctx.lineTo(e.touches[0].clientX - r.left,
                 e.touches[0].clientY - r.top);
      ctx.stroke();
    });
    canvas.addEventListener('touchend', () => dessin = false);

    function effacer() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function sauvegarder() {
      document.getElementById('signature_img').value =
        canvas.toDataURL('image/png');
    }
  </script>
</body>
</html>
